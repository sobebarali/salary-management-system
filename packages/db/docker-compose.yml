name: salary-management-system

services:
  postgres:
    image: postgres
    container_name: salary-management-system-postgres
    environment:
      POSTGRES_DB: salary-management-system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - salary-management-system_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  salary-management-system_postgres_data:
