server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro fingerprints asset filenames, so they can be cached forever.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Starlight emits directory-style routes (/reference/api/ -> .../index.html).
    # This is a multi-page static site, not a SPA: unknown paths must 404, not
    # fall back to the homepage, so broken deep links surface instead of hiding.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
