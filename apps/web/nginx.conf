server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite fingerprints asset filenames, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html is the SPA entry and is re-fetched to pick up new deploys.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths serve index.html so the client router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
